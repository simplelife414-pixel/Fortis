backend:
  name: github
  repo: simplelife414-pixel/Fortis
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "SEO 文章"
    folder: "posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "標題", name: "title", widget: "string" }
      - { label: "發布日期", name: "date", widget: "datetime" }
      - { label: "摘要", name: "description", widget: "text" }
      - { label: "封面圖片", name: "thumbnail", widget: "image", required: false }
      - { label: "內容", name: "body", widget: "markdown" }
